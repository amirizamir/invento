version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vm-inventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vm_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: vm-inventory-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vm_inventory?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-this-to-a-secure-random-string-in-production
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build: .
    container_name: vm-inventory-migrate
    command: sh -c "npx prisma db push && npx tsx prisma/seed.ts"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vm_inventory?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
