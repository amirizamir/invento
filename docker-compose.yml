# =============================================================================
# VM Inventory Manager — Production stack (Linux / Docker only)
#
# Quick start:
#   cp .env.example .env
#   nano .env                          # set NEXTAUTH_URL + passwords
#   docker compose up -d --build
#
# Optional:
#   docker compose --profile tools up -d studio   # Prisma Studio :5555
#   docker compose --profile tools run --rm test  # run tests
# =============================================================================

name: vm-inventory

services:
  postgres:
    image: postgres:16-alpine
    container_name: vm-inventory-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vm_inventory}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./data}:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - backend

  init-db:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    container_name: vm-inventory-init-db
    restart: "no"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vm_inventory}?schema=public
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      SEED_DATABASE: ${SEED_DATABASE:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
        NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-docker-build-secret-minimum-32-characters}
    container_name: vm-inventory-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vm_inventory}?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-generate-a-random-32-char-secret}
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      init-db:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - backend

  # --- Optional: docker compose --profile tools ... ---
  test:
    profiles: [tools]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vm_inventory}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  lint:
    profiles: [tools]
    build:
      context: .
      dockerfile: Dockerfile
      target: lint
    networks:
      - backend

  studio:
    profiles: [tools]
    build:
      context: .
      dockerfile: Dockerfile
      target: studio
    container_name: vm-inventory-studio
    restart: unless-stopped
    env_file: .env
    ports:
      - "${STUDIO_PORT:-5555}:5555"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-vm_inventory}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    name: vm-inventory-backend
